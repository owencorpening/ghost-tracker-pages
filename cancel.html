<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled — Ghost Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #202124;
      color: #e8eaed;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .container {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }
    .box {
      padding: 2.5rem;
      background: #2d2e31;
      border-radius: 12px;
      border: 1px solid #3c4043;
      box-shadow: 0 10px 30px rgba(0,0,0,.5);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { color: #8ab4f8; margin: 0 0 0.5rem; font-size: 1.8rem; }
    p { color: #9aa0a6; margin: 0.5rem 0; line-height: 1.6; }
    .cta {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 12px 28px;
      background: #8ab4f8;
      color: #202124;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: opacity 0.15s;
    }
    .cta:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <div class="icon">⏸️</div>
      <h1>Payment Cancelled</h1>
      <p>No worries. You can try again whenever you're ready.</p>
      <a href="/buy-credits.html" class="cta">Return to Pricing</a>
    </div>
  </div>
</body>
</html>
